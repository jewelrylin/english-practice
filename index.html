async function loadProgFromDB(userId) {
  const { data } = await sb.from('user_progress').select('progress').eq('user_id', userId).single();
  return data?.progress || null;
}
async function saveProgToDB(userId, prog) {
  const { data: existing } = await sb.from('user_progress')
    .select('user_id').eq('user_id', userId).maybeSingle();
  await sb.from('user_progress').upsert(
    { user_id: userId, progress: prog, updated_at: new Date().toISOString() },
    { onConflict: 'user_id' }
  );
  if (!existing) {
    await sb.rpc('increment_user_count');
  }
}

function shade(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const clamp = v => Math.max(0, Math.min(255, v));
  const d = Math.round(255 * pct / 100);
  return '#' + [n>>16, (n>>8)&0xff, n&0xff].map(c => clamp(c+d).toString(16).padStart(2,'0')).join('');
}
function speakEn(text, rate=0.85) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate; speechSynthesis.speak(u);
}

const LEVELS = (() => {
  const arr = [0];
  for (let i = 1; i < 80; i++) arr.push(arr[i-1] + i * 200);

})();

const DIFF_XP = { easy:5, medium:10, hard:15, expert:25 };

function getLevel(xp) {
  let lv = 1;
  for (let i = 1; i < LEVELS.length; i++) { if (xp >= LEVELS[i]) lv = i+1; else break; }
  return Math.min(lv, 80);
}
function nextLevelXP(xp) {
  const lv = getLevel(xp);
  return lv >= 80 ? null : LEVELS[lv];
}

const DEFAULT_COSMETICS = {
  gender: null,
  equipped: { hair: null, shirt: 'shirt_red', pants: 'pants_blue', accessory: 'acc_none', hat: 'hat_none' }
};

function findCosItem(cat, id) {
  return (COSMETIC_ITEMS[cat] || []).find(x => x.id === id) || null;
}
function getDefaultHair(gender) {
  return gender === 'female' ? 'hair_black_f' : 'hair_black_m';
}
function ensureCosmetics(p) {
  if (p.cosmetics && p.cosmetics.gender !== undefined) return p;
  return { ...p, cosmetics: { gender: null, equipped: { hair: null, shirt: 'shirt_red', pants: 'pants_blue', accessory: 'acc_none', hat: 'hat_none' } } };
}
function isCosItemUnlocked(item, prog) {
  if (getLevel(prog.xp) < item.level) return false;
  if (item.badge) return (prog.badges || []).includes(item.badge);
  return true;
}


function loadProg() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    const base = { xp:0, totalCorrect:0, totalSessions:0, perfectSessions:0,
      maxStreak:0, diffStats:{easy:0,medium:0,hard:0,expert:0},
      typeCorrect:{listen:0,phonics:0,fill:0,order:0},
      badges:[], allDailyDone:0, daily:null };
    return raw ? { ...base, ...JSON.parse(raw) } : base;
  } catch { return { xp:0, totalCorrect:0, totalSessions:0, perfectSessions:0,
    maxStreak:0, diffStats:{easy:0,medium:0,hard:0,expert:0},
    typeCorrect:{listen:0,phonics:0,fill:0,order:0}, badges:[], allDailyDone:0, daily:null }; }
}
function saveProg(p) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch {}
}
function ensureDaily(p) {
  const today = todayStr();
  if (p.daily?.date === today) return p;
  const ids = shuffle(TASK_POOL).slice(0,3).map(t=>t.id);
  return { ...p, daily:{ date:today, taskIds:ids, done:[],
    answered:0, correct:0, sessions:0, hardSess:0, perfect:0, streak:0, listenOk:0 } };
}

function calcMaxStreak(results) {
  let max=0, cur=0;
  for (const r of results) { if (r) { cur++; max=Math.max(max,cur); } else cur=0; }
  return max;
}

function processSession({ prog, results, difficulty, questions }) {
  let p = ensureDaily({ ...prog,
    diffStats: { ...prog.diffStats },
    typeCorrect: { ...prog.typeCorrect },
    daily: prog.daily ? { ...prog.daily } : null });

  const correct = results.filter(Boolean).length;
  const total   = results.length;
  const pct     = Math.round((correct/total)*100);
  const streak  = calcMaxStreak(results);
  const perfect = pct === 100;

  const baseXP = correct * DIFF_XP[difficulty];
  const bonusXP = perfect ? 50 : pct >= 90 ? 30 : pct >= 70 ? 15 : 0;
  const streakBonus = Math.floor(streak / 3) * 5;
  let xpGained = baseXP + bonusXP + streakBonus;

  questions.forEach((q, i) => {
    if (results[i]) p.typeCorrect[q.type] = (p.typeCorrect[q.type]||0) + 1;
  });

  const listenCorrectThisSession = questions.filter((q,i) => q.type==='listen' && results[i]).length;

  p.xp                += xpGained;
  p.totalCorrect      += correct;
  p.totalSessions     += 1;
  if (perfect) p.perfectSessions += 1;
  p.maxStreak          = Math.max(p.maxStreak, streak);
  p.diffStats[difficulty] = (p.diffStats[difficulty]||0) + 1;

  p.daily.answered += total;
  p.daily.correct  += correct;
  p.daily.sessions += 1;
  if (difficulty === 'hard' || difficulty === 'expert') p.daily.hardSess += 1;
  if (perfect) p.daily.perfect += 1;
  p.daily.streak   = Math.max(p.daily.streak, streak);
  p.daily.listenOk += listenCorrectThisSession;

  const newlyCompletedTasks = [];
  const taskDefs = TASK_POOL.filter(t => p.daily.taskIds.includes(t.id));
  taskDefs.forEach(t => {
    if (p.daily.done.includes(t.id)) return;
    const val = p.daily[t.key] || 0;
    if (val >= t.target) {
      p.daily.done.push(t.id);
      p.xp += t.reward;
      xpGained += t.reward;
      newlyCompletedTasks.push(t);
    }
  });
  const allDailyNowDone = taskDefs.length > 0 && taskDefs.every(t => p.daily.done.includes(t.id));
  if (allDailyNowDone && (prog.daily?.done?.length || 0) < taskDefs.length) p.allDailyDone = (p.allDailyDone || 0) + 1;

  const prevBadges = new Set(prog.badges || []);
  const newBadges  = [];
  BADGE_DEFS.forEach(b => {
    if (!prevBadges.has(b.id) && b.check(p)) {
      p.badges = [...(p.badges||[]), b.id];
      newBadges.push(b);
    }
  });

  const prevLv = getLevel(prog.xp);
  const newLv  = getLevel(p.xp);
  const leveledUp = newLv > prevLv;

  saveProg(p);
  return { p, xpGained, bonusXP, streakBonus, streak, newBadges, leveledUp, newLv,
           newlyCompletedTasks, allDailyDone: allDailyNowDone };
}

const VOWEL_IPA = { a:'/æ/', e:'/ɛ/', i:'/ɪ/', o:'/ɒ/', u:'/ʌ/', sh:'/ʃ/', th:'/θ/', ch:'/tʃ/', wh:'/w/' };
function slotIPA(s, picked) {
  if (s !== '_') return s==='c' ? '/k/' : s==='t' ? '/t/' : `/${s}/`;
  if (!picked) return '/  /';
  return VOWEL_IPA[picked] || `/${picked}/`;

function SoundWave({ active, color='#5b8def', bars=12 }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:3, height:28 }}>
      {Array.from({length:bars}).map((_,i) => (
        <div key={i} className={active ? 'wave-bar' : ''} style={{
          width:4, borderRadius:2, background:color, height:'35%', opacity:active?1:0.35,
          animationDelay:`${i*0.07}s`,
        }}/>
      ))}
    </div>
  );
}

function BigButton({ children, color='#3B82F6', onClick, full=false, disabled=false, style={} }) {
  const bg = disabled ? '#334155' : color;
  const shadow = disabled ? 'none' : `0 5px 0 #000, 0 6px 0 ${shade(bg,-30)}`;
  return (
    <button className="btn-press" onClick={onClick} disabled={disabled} style={{
      background: bg, color: disabled ? '#64748B' : '#fff',
      border: `3px solid #000`,
      borderRadius: 8, padding:'13px 24px', fontSize:16, fontWeight:800,
      fontFamily:'Fredoka, sans-serif', letterSpacing:0.5, textTransform:'uppercase',
      boxShadow: shadow,
      width: full ? '100%' : 'auto',
      cursor: disabled ? 'not-allowed' : 'pointer', ...style,
    }}>{children}</button>
  );
}

function XPBar({ xp, color='#3B82F6', compact=false }) {
  const lv  = getLevel(xp);
  const cur = LEVELS[lv-1] || 0;
  const nxt = nextLevelXP(xp);
  const pct = nxt ? Math.round(((xp-cur)/(nxt-cur))*100) : 100;
  const rankColors = ['#10B981','#3B82F6','#8B5CF6','#F59E0B','#EF4444','#EC4899','#06B6D4','#84CC16','#F97316','#FFD700'];
  const rc = rankColors[(lv-1) % rankColors.length];
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
      <div style={{ width:compact?34:42, height:compact?34:42, borderRadius:6, flexShrink:0,
        background:rc, border:'3px solid #000',
        boxShadow:`0 4px 0 #000, 0 0 12px ${rc}88`,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span style={{ color:'#000', fontSize:compact?11:13, fontWeight:800, lineHeight:1 }}>{lv}</span>
        {!compact && <span style={{ color:'#000', fontSize:8, fontWeight:800, opacity:0.7 }}>RANK</span>}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        {!compact && <div style={{ fontSize:12, fontWeight:400, color:'#94A3B8', marginBottom:4 }}>
          <span style={{ color:rc, fontWeight:700 }}>{LEVEL_TITLES[lv-1]}</span>
          {' · '}{xp} XP {nxt ? `→ ${nxt}` : '🏆 MAX'}
        </div>}
        <div className="xp-track">
          <div className="xp-fill" style={{ width:`${pct}%`,
            background:`linear-gradient(90deg, ${rc}, ${shade(rc,20)})` }}/>
        </div>
        {!compact && nxt && <div style={{ fontSize:10, color:'#64748B', marginTop:3, fontWeight:400 }}>
          ⚡ 再 {nxt-xp} XP 升級
        </div>}
      </div>
    </div>
  );
}


function TasksModal({ prog, onClose }) {
  const p = ensureDaily(prog);
  const daily = p.daily;
  const tasks = TASK_POOL.filter(t => daily.taskIds.includes(t.id));
  const completedAll = tasks.every(t => daily.done.includes(t.id));
  return (
    <div className="modal-bg" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box slide-up">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div>
            <div style={{ fontSize:20, fontWeight:800, color:'#F8FAFC' }}>📋 每日任務</div>
            <div style={{ fontSize:12, color:'#64748B', fontWeight:400 }}>每天重新整理 · 完成獲得 XP 獎勵</div>
          </div>
          <button onClick={onClose} className="btn-press" style={{ background:'#0F1A2E', border:'3px solid #334155',
            borderRadius:8, width:36, height:36, fontSize:16, color:'#94A3B8', boxShadow:'0 3px 0 #000' }}>✕</button>
        </div>
        {completedAll && (
          <div style={{ background:'#1c0f00', border:'3px solid #F59E0B', borderRadius:10,
            padding:'14px 16px', marginBottom:14, color:'#F59E0B', fontWeight:800, fontSize:14,
            display:'flex', alignItems:'center', gap:10, boxShadow:'0 0 16px rgba(245,158,11,0.3)' }}>
            <span style={{fontSize:24}}>🎉</span><span>ALL MISSIONS COMPLETE! 明天再見！</span>
          </div>
        )}
        <div style={{ display:'grid', gap:10, marginBottom:20 }}>
          {tasks.map(t => {
            const done = daily.done.includes(t.id);
            const progress = Math.min(daily[t.key]||0, t.target);
            const pct = Math.round((progress/t.target)*100);
            return (
              <div key={t.id} style={{ background: done ? '#052e16' : '#0F1A2E', borderRadius:10,
                padding:'14px 16px', border:`3px solid ${done ? '#10B981' : '#334155'}` }}>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <span style={{ fontSize:26 }}>{t.emoji}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:800, fontSize:14, color: done ? '#10B981' : '#F8FAFC' }}>
                      {t.name}{done && <span style={{ marginLeft:8, fontSize:12, color:'#10B981' }}>✓ COMPLETE!</span>}
                    </div>
                    <div style={{ fontSize:12, color:'#64748B', fontWeight:400, marginTop:1 }}>{t.desc}</div>
                    <div className="xp-track" style={{ marginTop:8, height:6 }}>
                      <div style={{ height:'100%', width:`${pct}%`, borderRadius:4,
                        background: done ? '#10B981' : '#3B82F6', transition:'width .4s' }}/>
                    </div>
                    <div style={{ fontSize:11, color:'#475569', marginTop:3, fontWeight:700 }}>{progress} / {t.target}</div>
                  </div>
                  <div style={{ textAlign:'center', minWidth:48 }}>
                    <div style={{ fontSize:13, color:'#F59E0B', fontWeight:800 }}>+{t.reward}</div>
                    <div style={{ fontSize:10, color:'#64748B', fontWeight:700 }}>XP</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ background:'#0F1A2E', borderRadius:10, border:'3px solid #334155', padding:'12px 16px' }}>
          <div style={{ fontSize:11, fontWeight:600, color:'#64748B', marginBottom:8, letterSpacing:1 }}>📊 TODAY'S STATS</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, textAlign:'center' }}>
            {[
              { label:'已答題', value: daily.answered, color:'#3B82F6' },
              { label:'答對題', value: daily.correct,  color:'#10B981' },
              { label:'完成場次', value: daily.sessions, color:'#8B5CF6' },
            ].map(s => (
              <div key={s.label} style={{ background:'#1E293B', border:`2px solid ${s.color}44`, borderRadius:8, padding:'10px 6px' }}>
                <div style={{ fontSize:20, fontWeight:800, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:11, color:'#64748B', fontWeight:700 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AvatarEditor({ prog, onSave, onClose }) {
  const cos0 = ensureCosmetics(prog).cosmetics;
  const [cos, setCos] = React.useState(() => ({
    gender: cos0.gender,
    equipped: { ...DEFAULT_COSMETICS.equipped, ...(cos0.equipped || {}) }
  }));
  const [tab, setTab] = React.useState(cos.gender ? 'hair' : 'gender');
  const lv = getLevel(prog.xp);
  const gender = cos.gender || 'male';

  const equip = (cat, id) => setCos(c => ({ ...c, equipped: { ...c.equipped, [cat]: id } }));

  const setGender = (g) => {
    const hairId = cos.equipped.hair;
    const hairItem = findCosItem('hair', hairId);
    const newHair = (!hairItem || hairItem.gender === 'all' || hairItem.gender === g)
      ? hairId : getDefaultHair(g);
    setCos(c => ({ ...c, gender: g, equipped: { ...c.equipped, hair: newHair } }));
    setTab('hair');
  };

  const itemTabs = cos.gender
    ? [['hair','💇 髮型'],['shirt','👕 上衣'],['pants','👖 下裝'],['hat','🎩 帽子'],['accessory','✨ 配件']]

            <div style={{ fontSize:12, color:'#F59E0B', fontWeight:700, marginTop:4 }}>

// ── Isometric map helpers ──────────────────────────────────────────
const ISO = { tw:56, th:28, bh:18, ox:390, oy:80 };
function isoXY(gx, gy, gz=0) {
  return {
    x: ISO.ox + (gx - gy) * (ISO.tw/2),
    y: ISO.oy + (gx + gy) * (ISO.th/2) - gz * ISO.bh
  };
}
function pts(arr) { return arr.map(p=>`${p.x},${p.y}`).join(' '); }
function IsoTile({ gx, gy, gz=0, w=1, d=1, top='#4ADE80', left='#16A34A', right='#15803D' }) {
  const t = [[gx,gy],[gx+w,gy],[gx+w,gy+d],[gx,gy+d]].map(([x,y])=>isoXY(x,y,gz));
  const l = [[gx,gy+d,gz],[gx+w,gy+d,gz],[gx+w,gy+d,gz+1],[gx,gy+d,gz+1]].map(([x,y,z])=>isoXY(x,y,z));
  const r = [[gx+w,gy,gz],[gx+w,gy+d,gz],[gx+w,gy+d,gz+1],[gx+w,gy,gz+1]].map(([x,y,z])=>isoXY(x,y,z));
  return (<g>
    <polygon points={pts(l)} fill={left} stroke="#0008" strokeWidth="0.5"/>
    <polygon points={pts(r)} fill={right} stroke="#0008" strokeWidth="0.5"/>
    <polygon points={pts(t)} fill={top} stroke="#0008" strokeWidth="0.5"/>
  </g>);
}
function IsoBlock({ gx, gy, gz=0, w=1, d=1, h=1, top, left, right }) {
  const tiles = [];
  for(let z=0; z<h; z++) tiles.push(<IsoTile key={z} gx={gx} gy={gy} gz={gz+z} w={w} d={d} top={top} left={left} right={right}/>);
  return <g>{tiles}</g>;
}
// Tree: trunk + crown
function IsoTree({ gx, gy }) {
  return (<g>
    <IsoBlock gx={gx+0.35} gy={gy+0.35} gz={0} w={0.3} d={0.3} h={1} top="#92400E" left="#78350F" right="#6B2D0E"/>
    <IsoBlock gx={gx+0.1} gy={gy+0.1} gz={1} w={0.8} d={0.8} h={0.8} top="#22C55E" left="#16A34A" right="#15803D"/>
  </g>);
}
// Pine tree
function IsoPine({ gx, gy }) {
  return (<g>
    <IsoBlock gx={gx+0.4} gy={gy+0.4} gz={0} w={0.2} d={0.2} h={0.8} top="#92400E" left="#78350F" right="#6B2D0E"/>
    <IsoBlock gx={gx+0.15} gy={gy+0.15} gz={0.8} w={0.7} d={0.7} h={0.6} top="#15803D" left="#166534" right="#14532D"/>
    <IsoBlock gx={gx+0.25} gy={gy+0.25} gz={1.3} w={0.5} d={0.5} h={0.6} top="#16A34A" left="#15803D" right="#14532D"/>
  </g>);
}
// Castle wall segment
function IsoWall({ gx, gy, w=1, d=0.3, h=2 }) {
  return <IsoBlock gx={gx} gy={gy} gz={0} w={w} d={d} h={h} top="#9CA3AF" left="#6B7280" right="#4B5563"/>;
}
// Stone block
function IsoStone({ gx, gy, w=1, d=1, h=1 }) {
  return <IsoBlock gx={gx} gy={gy} gz={0} w={w} d={d} h={h} top="#94A3B8" left="#64748B" right="#475569"/>;
}

// Character path waypoints on the isometric map (gx,gy coords)
const PATH_WPS = [
  {gx:1.5,gy:7},{gx:2,gy:6.5},{gx:2.5,gy:6},{gx:3,gy:5.5},{gx:3.5,gy:5.2},   // zone1 Lv1-2
  {gx:4,gy:5},{gx:4.2,gy:4.8},{gx:4.5,gy:4.6},{gx:5,gy:4.3},{gx:5.5,gy:4},     // zone1 Lv3-10
  {gx:5.8,gy:3.8},{gx:6,gy:3.5},{gx:6.3,gy:3.2},{gx:6.5,gy:3},{gx:6.8,gy:2.8}, // zone2
  {gx:7,gy:2.6},{gx:7.2,gy:2.4},{gx:7.4,gy:2.2},{gx:7.5,gy:2},{gx:7.6,gy:1.8}, // zone2
  {gx:7.5,gy:1.6},{gx:7.3,gy:1.4},{gx:7,gy:1.3},{gx:6.8,gy:1.2},{gx:6.5,gy:1}, // zone3
  {gx:6.2,gy:0.9},{gx:6,gy:0.8},{gx:5.8,gy:0.7},{gx:5.5,gy:0.6},{gx:5.2,gy:0.5},// zone3
  {gx:5,gy:0.4},{gx:4.8,gy:0.3},{gx:4.5,gy:0.3},{gx:4.2,gy:0.4},{gx:4,gy:0.5}, // zone4
  {gx:3.8,gy:0.6},{gx:3.5,gy:0.5},{gx:3.3,gy:0.4},{gx:3,gy:0.3},{gx:2.8,gy:0.2},// zone4
  {gx:2.5,gy:0.2},{gx:2.3,gy:0.3},{gx:2,gy:0.4},{gx:1.8,gy:0.5},{gx:1.5,gy:0.6},// zone5
  {gx:1.3,gy:0.5},{gx:1.1,gy:0.4},{gx:0.9,gy:0.3},{gx:0.7,gy:0.2},{gx:0.5,gy:0.1},// zone5
  {gx:0.3,gy:0}, // Lv50
];

function levelToWaypoint(lv) {
  const idx = Math.min(Math.max(lv-1, 0), PATH_WPS.length-1);
  const wp = PATH_WPS[idx];
  const p = isoXY(wp.gx, wp.gy, 1.2);
  return p;
}

function MapCharacter({ lv, cosmetics }) {
  const pos = levelToWaypoint(lv);
  const cos = cosmetics && cosmetics.gender !== undefined ? cosmetics : DEFAULT_COSMETICS;
  const eq = { ...DEFAULT_COSMETICS.equipped, ...(cos.equipped || {}) };
  const shirtItem = (COSMETIC_ITEMS.shirt||[]).find(x=>x.id===eq.shirt);
  const pantsItem = (COSMETIC_ITEMS.pants||[]).find(x=>x.id===eq.pants);
  const sc = shirtItem?.color||'#EF4444';
  const pc = pantsItem?.color||'#3B5CF6';
  const skin = cos.gender==='female' ? '#FBBF99' : '#FBBF24';
  const s = 0.55; // scale
  return (
    <g transform={`translate(${pos.x-14*s},${pos.y-36*s}) scale(${s})`}>
      {/* shadow */}
      <ellipse cx="14" cy="38" rx="10" ry="4" fill="#0005"/>
      {/* body */}
      <rect x="6" y="16" width="16" height="14" rx="2" fill={sc} stroke="#000" strokeWidth="1.5"/>

      {/* arms */}
      <rect x="0" y="16" width="6" height="10" rx="2" fill={sc} stroke="#000" strokeWidth="1.5"/>
      <rect x="22" y="16" width="6" height="10" rx="2" fill={sc} stroke="#000" strokeWidth="1.5"/>
      {/* star above */}

}

function ListenQuestion({ q, onAnswer }) {
  const [choices] = React.useState(() => shuffle(q.choices.map((c,i) => ({ label:c, origIdx:i }))));
  const [selected, setSelected] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState(false);
  const [playing, setPlaying] = React.useState(false);

  const play = () => {
    setPlaying(true);
    speakEn(q.text, 0.82);
    setTimeout(() => setPlaying(false), Math.max(1400, q.text.length * 60));
  };
  React.useEffect(() => { setTimeout(play, 400); }, []);

  const confirm = () => {
    if (selected === null || confirmed) return;
    const isCorrect = choices[selected].origIdx === q.correct;
    setConfirmed(true);
    onAnswer(isCorrect, choices[selected].label, q.choices[q.correct]);
  };

  return (
    <div className="slide-up">
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:400, color:'#94A3B8', letterSpacing:0.5, marginBottom:8 }}>👂 聆聽並選出你聽到的句子</div>
        <div style={{ fontSize:50, marginBottom:12 }}>{q.emoji}</div>
        <div style={{ display:'inline-flex', alignItems:'center', gap:14, background:'#0F1A2E',
          border:'3px solid #334155', borderRadius:999, padding:'10px 20px', cursor:'pointer' }} onClick={play}>
          <div style={{ width:44, height:44, borderRadius:'50%', background: playing ? '#EF4444' : '#3B82F6',
            display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 4px 0 #000', transition:'background .2s' }}>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3z"/>
              {playing && <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.73 2.5-2.25 2.5-4.03zm2.5 0c0 2.89-1.57 5.43-4 6.83v-2.19c1.29-1.14 2-2.82 2-4.64s-.71-3.5-2-4.64V5.17c2.43 1.4 4 3.94 4 6.83z"/>}
            </svg>
          </div>
          <SoundWave active={playing} color="#3B82F6" bars={14}/>
        </div>
        <div style={{ fontSize:12, color:'#64748B', marginTop:8, fontWeight:400 }}>點擊播放音訊 · 可重複播放</div>
      </div>
      <div style={{ display:'grid', gap:10 }}>
        {choices.map((c, i) => {
          const isCorrect = c.origIdx === q.correct;
          const isSelected = selected === i;
          let bg='#0F1A2E', border='3px solid #334155', clr='#F8FAFC', sh='0 3px 0 #000';
          if (!confirmed && isSelected) { bg='#1E3A8A'; border='3px solid #3B82F6'; clr='#93C5FD'; sh='0 3px 0 #1E3A8A'; }
          else if (confirmed) {
            if (isCorrect)       { bg='#052e16'; border='3px solid #10B981'; clr='#10B981'; sh='none'; }
            else if (isSelected) { bg='#2d0f0f'; border='3px solid #EF4444'; clr='#EF4444'; sh='none'; }
            else                 { clr='#475569'; sh='none'; }
          }
          return (
            <button key={i} onClick={() => !confirmed && setSelected(i)} disabled={confirmed} style={{
              background:bg, border, color:clr, borderRadius:10, padding:'14px 18px',
              fontSize:14, fontWeight:700, textAlign:'left', cursor:confirmed?'default':'pointer',
              boxShadow:sh, transition:'all .2s', display:'flex', alignItems:'center', gap:10, fontFamily:'Fredoka, sans-serif',
            }}>
              <span style={{ fontSize:15, fontWeight:800, color: !confirmed&&isSelected?'#93C5FD':'#475569',
                minWidth:22, background:'#1E293B', borderRadius:4, padding:'1px 5px' }}>{String.fromCharCode(65+i)}</span>
              <span>{c.label}</span>
              {confirmed && isCorrect   && <span style={{ marginLeft:'auto', color:'#10B981', fontSize:20 }}>✓</span>}
              {confirmed && isSelected && !isCorrect && <span style={{ marginLeft:'auto', color:'#EF4444', fontSize:20 }}>✕</span>}
            </button>
          );
        })}
      </div>
      {selected !== null && !confirmed && (
        <div style={{ marginTop:12 }}>
          <BigButton onClick={confirm} color='#3B82F6' full>✓ 確認答案</BigButton>
        </div>
      )}
      {confirmed && (
        <div style={{ marginTop:12, padding:'10px 14px', borderRadius:10,
          background: choices[selected].origIdx===q.correct ? '#052e16' : '#1c0f00',
          border:`2px solid ${choices[selected].origIdx===q.correct ? '#10B981' : '#F59E0B'}`,
          fontSize:13, color:'#F8FAFC', fontWeight:700 }}>
          💡 <b style={{color:'#F59E0B'}}>{q.text}</b> · {q.cn}
        </div>
      )}
    </div>
  );
}

function PhonicsQuestion({ q, onAnswer }) {
  const [picked, setPicked] = React.useState(null);
  const [answered, setAnswered] = React.useState(false);
  const [choices] = React.useState(() => shuffle(q.choices));

  const confirm = () => {
    if (!picked || answered) return;
    setAnswered(true);
    onAnswer(picked===q.answer, picked, q.answer);
  };

  return (
    <div className="slide-up">
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:400, color:'#94A3B8', letterSpacing:0.5, marginBottom:8 }}>🔤 填入缺少的字母，拼出這個單字</div>
        <div style={{ fontSize:64, marginBottom:10 }}>{q.emoji}</div>
        <button onClick={() => speakEn(q.word, 0.7)} style={{ background:'#3B82F6', border:'3px solid #000',
          borderRadius:8, padding:'8px 20px', color:'#fff', fontSize:13, fontWeight:800,
          cursor:'pointer', marginBottom:16, boxShadow:'0 4px 0 #1E3A8A', fontFamily:'Fredoka, sans-serif' }}>
          🔊 聽發音
        </button>
        <div style={{ display:'flex', gap:10, justifyContent:'center', marginBottom:8 }}>
          {q.slots.map((s, i) => {
            const isBlank = s==='_';
            let bg='#1E293B', bdr='3px solid #334155', clr='#F8FAFC';
            if (isBlank && picked) {
              if (answered) {
                bg = picked===q.answer ? '#052e16' : '#2d0f0f';
                bdr = `3px solid ${picked===q.answer ? '#10B981' : '#EF4444'}`;
                clr = picked===q.answer ? '#10B981' : '#EF4444';
              } else { bg='#1c1000'; bdr='3px solid #F59E0B'; clr='#F59E0B'; }
            } else if (isBlank) { bg='#0F1A2E'; bdr='3px dashed #8B5CF6'; clr='#8B5CF6'; }
            return (
              <div key={i} style={{ width:64, height:80, borderRadius:12, background:bg, border:bdr,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:44, fontWeight:800, color: isBlank ? clr : '#F8FAFC',
                fontFamily:'Fredoka, sans-serif', transition:'all .2s' }}>
                {isBlank ? (picked||'') : s}
              </div>
            );
          })}
        </div>
        <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
          {q.slots.map((s, i) => (
            <div key={i} style={{ width:64, textAlign:'center', fontSize:12, color:'#64748B', fontWeight:700 }}>
              {slotIPA(s, s==='_' ? picked : null)}
            </div>
          ))}
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'center', gap:12, marginTop:16 }}>
        {choices.map(letter => {
          const isCorrect=letter===q.answer, isPicked=letter===picked;
          let bg='#1E293B', clr='#F8FAFC', bdr='3px solid #334155', sh='0 4px 0 #000';
          if (!answered && isPicked) { bg='#1E3A8A'; clr='#93C5FD'; bdr='3px solid #3B82F6'; sh='0 4px 0 #1E3A8A'; }
          else if (answered) {
            if (isCorrect)  { bg='#10B981'; clr='#fff'; bdr='3px solid #000'; sh='none'; }
            else if (isPicked) { bg='#EF4444'; clr='#fff'; bdr='3px solid #000'; sh='none'; }
            else { bg='#0F1A2E'; clr='#334155'; bdr='3px solid #1E293B'; sh='none'; }
          }
          return (
            <button key={letter} onClick={() => !answered && setPicked(letter)} disabled={answered}
              className={!answered?'btn-press':''} style={{
                width:64, height:64, borderRadius:10, background:bg, border:bdr,
                fontSize:28, fontWeight:800, color:clr, cursor:answered?'default':'pointer',
                boxShadow:sh, fontFamily:'Fredoka, sans-serif', transition:'all .2s',
              }}>{letter}</button>
          );
        })}
      </div>
      {picked && !answered && (
        <div style={{ marginTop:14 }}>
          <BigButton onClick={confirm} color='#3B82F6' full>✓ 確認答案</BigButton>
        </div>
      )}
      {answered && (
        <div style={{ marginTop:16, padding:'10px 14px', borderRadius:10,
          background: picked===q.answer ? '#052e16' : '#1c0f00',
          border:`3px solid ${picked===q.answer ? '#10B981' : '#F59E0B'}`,
          fontSize:13, fontWeight:700, color:'#F8FAFC' }}>
          {picked===q.answer
            ? `✅ 正確！ "${q.word}" · ${VOWEL_IPA[q.answer]||`/${q.answer}/`}`
            : `💡 正確答案是 "${q.answer}" · 這個字是 "${q.word}"`}
        </div>
      )}
    </div>
  );
}

function FillQuestion({ q, onAnswer }) {
  const [choices] = React.useState(() => shuffle(q.choices.map((c,i)=>({label:c,origIdx:i}))));
  const [selected, setSelected] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState(false);

  const confirm = () => {
    if (selected === null || confirmed) return;
    const label = choices[selected].label;
    setConfirmed(true);
    onAnswer(label===q.answer, label, q.answer);
  };
  const parts = q.sentence.split('___');

  return (
    <div className="slide-up">
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:400, color:'#94A3B8', letterSpacing:0.5, marginBottom:8 }}>📝 選擇正確的單字，填入空格</div>
        <div style={{ fontSize:52, marginBottom:12 }}>{q.emoji}</div>
        <div style={{ background:'#0F1A2E', border:'3px solid #334155', borderRadius:12, padding:'16px 20px',
          fontSize:18, fontWeight:700, lineHeight:1.8, marginBottom:4, color:'#F8FAFC' }}>
          {parts[0]}
          <span style={{
            display:'inline-block', minWidth:80, padding:'2px 12px', margin:'0 4px',
            borderRadius:8, verticalAlign:'middle',
            background: selected===null ? 'rgba(139,92,246,0.15)' : (!confirmed ? '#1E3A8A' : (choices[selected].label===q.answer ? '#052e16' : '#2d0f0f')),
            border:`3px ${selected===null?'dashed':'solid'} ${selected===null ? '#8B5CF6' : (!confirmed ? '#3B82F6' : (choices[selected].label===q.answer ? '#10B981' : '#EF4444'))}`,
            color: selected===null ? '#8B5CF6' : (!confirmed ? '#93C5FD' : (choices[selected].label===q.answer ? '#10B981' : '#EF4444')),
            fontWeight:800, fontSize:17, textAlign:'center',
          }}>{selected===null ? '___' : choices[selected].label}</span>
          {parts[1]}
        </div>
        {q.hint && <div style={{ fontSize:12, color:'#94A3B8', marginTop:4, fontWeight:400 }}>💡 提示：{q.hint}</div>}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {choices.map((c, i) => {
          const isCorrect=c.label===q.answer, isSelected=selected===i;
          let bg='#1E293B', border='3px solid #334155', clr='#F8FAFC', sh='0 4px 0 #000';
          if (!confirmed && isSelected) { bg='#1E3A8A'; border='3px solid #3B82F6'; clr='#93C5FD'; sh='0 4px 0 #1E3A8A'; }
          else if (confirmed) {
            if (isCorrect)       { bg='#052e16'; border='3px solid #10B981'; clr='#10B981'; sh='none'; }
            else if (isSelected) { bg='#2d0f0f'; border='3px solid #EF4444'; clr='#EF4444'; sh='none'; }
            else                 { bg='#0F1A2E'; clr='#334155'; border='3px solid #1E293B'; sh='none'; }
          }
          return (
            <button key={i} onClick={() => !confirmed && setSelected(i)} disabled={confirmed}
              className={!confirmed?'btn-press':''} style={{
                background:bg, border, color:clr, borderRadius:10, padding:'16px 12px',
                fontSize:15, fontWeight:800, cursor:confirmed?'default':'pointer',
                boxShadow:sh, transition:'all .2s', fontFamily:'Fredoka, sans-serif',
              }}>
              {c.label}
              {confirmed && isCorrect   && <span style={{marginLeft:6, fontSize:16}}>✓</span>}
              {confirmed && isSelected && !isCorrect && <span style={{marginLeft:6, fontSize:16}}>✕</span>}
            </button>
          );
        })}
      </div>
      {selected !== null && !confirmed && (
        <div style={{ marginTop:12 }}>
          <BigButton onClick={confirm} color='#3B82F6' full>✓ 確認答案</BigButton>
        </div>
      )}
      {confirmed && choices[selected].label!==q.answer && (
        <div style={{ marginTop:12, padding:'10px 14px', borderRadius:10,
          background:'#1c0f00', border:'3px solid #F59E0B', fontSize:13, fontWeight:700, color:'#F8FAFC' }}>
          💡 正確答案：<b style={{color:'#F59E0B'}}>{q.answer}</b>
        </div>
      )}
    </div>
  );
}

function OrderQuestion({ q, onAnswer }) {
  const [tiles] = React.useState(() => shuffle(q.words.map((w,i)=>({word:w,id:i}))));
  const [selected, setSelected] = React.useState([]);
  const [answered, setAnswered] = React.useState(false);
  const [correct, setCorrect] = React.useState(false);

  const remaining = tiles.filter(t => !selected.includes(t.id));
  const sentence = selected.map(id => tiles.find(t=>t.id===id).word).join(' ');

  const check = () => {
    const norm = sentence.toLowerCase().replace(/[?!,]/g,'').trim();
    const exp  = q.answer.toLowerCase().replace(/[?!,]/g,'').trim();
    const ok = norm===exp;
    setCorrect(ok); setAnswered(true);
    onAnswer(ok, sentence, q.answer);
  };

  return (
    <div className="slide-up">
      <div style={{ fontSize:13, fontWeight:400, color:'#94A3B8', letterSpacing:0.5, marginBottom:8, textAlign:'center' }}>
        🔀 點擊單字，排列成正確的句子 {q.emoji}
      </div>
      <div style={{ minHeight:72, background:'#0F1A2E', borderRadius:10, padding:'12px 14px',
        border: answered ? `3px solid ${correct?'#10B981':'#EF4444'}` : '3px dashed #8B5CF6',
        marginBottom:10, display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
        {selected.length===0 && <span style={{color:'#334155',fontSize:13,fontWeight:700}}>點下方單字開始排列…</span>}
        {selected.map(id => {
          const t = tiles.find(t=>t.id===id);
          return (
            <button key={id} onClick={() => !answered && setSelected(s=>s.filter(x=>x!==id))} disabled={answered}
              style={{ background:'#8B5CF6', color:'#fff', border:'3px solid #000', borderRadius:8,
                padding:'6px 12px', fontSize:15, fontWeight:800, cursor:answered?'default':'pointer',
                boxShadow:'0 3px 0 #4C1D95', fontFamily:'Fredoka, sans-serif' }}>{t.word}</button>
          );
        })}
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, justifyContent:'center', minHeight:52, marginBottom:12 }}>
        {remaining.map(t => (
          <button key={t.id} onClick={() => !answered && setSelected(s=>[...s,t.id])} disabled={answered}
            className="btn-press" style={{ background:'#1E293B', color:'#F8FAFC', border:'3px solid #334155',
              borderRadius:8, padding:'8px 14px', fontSize:15, fontWeight:800,
              cursor:'pointer', boxShadow:'0 3px 0 #000', fontFamily:'Fredoka, sans-serif' }}>{t.word}</button>
        ))}
      </div>
      {!answered && (
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={() => setSelected([])} className="btn-press" style={{
            flex:1, background:'#1E293B', border:'3px solid #334155', borderRadius:8, padding:'12px',
            fontSize:14, fontWeight:800, cursor:'pointer', color:'#94A3B8', boxShadow:'0 4px 0 #000',
            fontFamily:'Fredoka, sans-serif' }}>↺ 重置</button>
          <BigButton onClick={check} disabled={selected.length<tiles.length} color='#8B5CF6' style={{flex:2}}>
            ✓ 確認答案
          </BigButton>
        </div>
      )}
      {answered && (
        <div style={{ padding:'12px 14px', borderRadius:10, marginTop:8,
          background: correct ? '#052e16' : '#1c0f00',
          border:`3px solid ${correct ? '#10B981' : '#F59E0B'}`,
          fontSize:13, fontWeight:700, color:'#F8FAFC' }}>
          {correct ? '✅ 排列正確！'
            : <span>💡 正確句子：<br/><b style={{color:'#F59E0B',fontSize:14}}>{q.answer}</b></span>}
        </div>
      )}
    </div>
  );
}

const BOSS_DATA = [
  { lv:10,  emoji:'👾', name:'像素惡魔',  color:'#EF4444' },
  { lv:20,  emoji:'🐉', name:'石牆巨龍',  color:'#F59E0B' },

  { lv:50,  emoji:'💀', name:'深淵死神',  color:'#8B5CF6' },
  { lv:60,  emoji:'🔥', name:'熔岩泰坦',  color:'#F97316' },
  { lv:70,  emoji:'⚡', name:'雷霆神君',  color:'#FCD34D' },

function BossAnimation({ playerLevel }) {
  const boss = BOSS_DATA.find(b => b.lv === playerLevel);
  if (!boss) return null;
  const [pos, setPos] = React.useState({ x: 80, y: 20 });
  const [dir, setDir] = React.useState({ x: 1.2, y: 0.7 });
  const [flip, setFlip] = React.useState(false);
  React.useEffect(() => {
    const id = setInterval(() => {
      setPos(p => {
        let nx = p.x + dir.x, ny = p.y + dir.y;
        let dx = dir.x, dy = dir.y;
        if (nx > 88 || nx < 2) { dx = -dx; setFlip(f => !f); }
        if (ny > 75 || ny < 5) dy = -dy;
        setDir({ x: dx, y: dy });
        return { x: Math.max(2, Math.min(88, nx)), y: Math.max(5, Math.min(75, ny)) };
      });
    }, 35);
    return () => clearInterval(id);
  }, [dir]);
  return (
    <div style={{ position:'fixed', left:`${pos.x}%`, top:`${pos.y}%`, zIndex:50,
      pointerEvents:'none', transition:'left 0.035s linear, top 0.035s linear',
      transform:`scaleX(${flip?-1:1})`, fontSize:44, filter:'drop-shadow(0 0 8px ' + boss.color + ')',
      userSelect:'none' }}>
      {boss.emoji}
      <div style={{ position:'absolute', bottom:-14, left:'50%', transform:'translateX(-50%)',
        fontSize:8, fontWeight:800, color:boss.color, whiteSpace:'nowrap',
        textShadow:'0 0 6px ' + boss.color, letterSpacing:0.5 }}>{boss.name}</div>
    </div>
  );
}

        <div style={{ fontSize:14, color:'#94A3B8', fontWeight:400, marginBottom:12 }}>答對 {correct} / {total} 題</div>

        <div style={{ display:'flex', justifyContent:'center', gap:8, marginBottom:14 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{ fontSize:32, opacity:i<stars?1:0.15,
              filter: i<stars ? 'drop-shadow(0 0 8px #F59E0B)' : 'none' }}>⭐</div>
          ))}
        </div>

        <div style={{ display:'flex', justifyContent:'center', gap:6, flexWrap:'wrap', marginBottom:14 }}>
          {results.map((ok,i) => (
            <div key={i} style={{ width:34, height:34, borderRadius:8, fontSize:14,
              background: ok ? '#052e16' : '#2d0f0f',
              border:`2px solid ${ok?'#10B981':'#EF4444'}`,
              color: ok ? '#10B981' : '#EF4444',
              display:'flex', alignItems:'center', justifyContent:'center', fontWeight:800 }}>{ok?'✓':'✕'}</div>
          ))}
        </div>

        <div style={{ background:'#0F1A2E', borderRadius:10, border:'3px solid #F59E0B', padding:'12px 16px', marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:800, color:'#F59E0B', marginBottom:8 }}>⚡ 本場 XP 獲得</div>
          <div style={{ display:'grid', gap:4 }}>
            {[
              { label:`答對 ${correct} 題`, value: correct * DIFF_XP[difficulty], show: correct > 0 },
              { label:'場次加成', value: bonusXP, show: bonusXP > 0 },
              { label:`連勝加成 (最長 ${streak} 題)`, value: streakBonus, show: streakBonus > 0 },
              ...newlyCompletedTasks.map(t => ({ label:`任務完成：${t.name}`, value: t.reward, show: true })),
            ].filter(r => r.show).map((row, i) => (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', fontSize:13, fontWeight:700 }}>
                <span style={{ color:'#94A3B8' }}>{row.label}</span>
                <span style={{ color:'#F59E0B' }}>+{row.value} XP</span>

            <div style={{ borderTop:'2px solid #334155', paddingTop:6, marginTop:4,
              display:'flex', justifyContent:'space-between', fontSize:16, fontWeight:800 }}>
              <span style={{ color:'#F8FAFC' }}>TOTAL</span>
              <span style={{ color:'#F59E0B' }}>+{xpGained} XP 🎉</span>
            </div>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <XPBar xp={newProg.xp} color={diff.color}/>
        </div>

        {newBadges.length > 0 && (
          <div style={{ background:'#0F1A2E', borderRadius:10, border:'3px solid #F59E0B', padding:'12px 16px', marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:800, color:'#F59E0B', marginBottom:8 }}>🏅 新解鎖成就！</div>
            <div style={{ display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>
              {newBadges.map(b => (
                <div key={b.id} className="badge-pop" style={{ textAlign:'center' }}>
                  <div style={{ fontSize:32 }}>{b.emoji}</div>
                  <div style={{ fontSize:12, fontWeight:800, color:'#F8FAFC' }}>{b.name}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {newlyCompletedTasks.length > 0 && (
          <div style={{ background:'#052e16', borderRadius:10, padding:'10px 14px', marginBottom:14,
            border:'3px solid #10B981', textAlign:'left' }}>
            <div style={{ fontSize:12, fontWeight:800, color:'#10B981', marginBottom:4 }}>📋 MISSION COMPLETE!</div>
            {newlyCompletedTasks.map(t => (
              <div key={t.id} style={{ fontSize:13, fontWeight:700, color:'#F8FAFC', display:'flex', gap:6 }}>
                <span>{t.emoji}</span>
                <span>{t.name} — <b style={{color:'#10B981'}}>+{t.reward} XP</b></span>
              </div>
            ))}
          </div>
        )}

        <div style={{ display:'flex', gap:10, flexWrap:'wrap', justifyContent:'center' }}>
          <BigButton onClick={onRetry} color={diff.color}>🔄 再練一次</BigButton>
          <BigButton onClick={onHome} color='#334155'>🏠 選難度</BigButton>
        </div>
      </div>
    </div>
  );
}

function LoginScreen() {
  const [tab, setTab] = React.useState('login');
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [done, setDone] = React.useState('');
  const [userCount, setUserCount] = React.useState(null);

  React.useEffect(() => {
    sb.from('site_stats').select('value').eq('key', 'visitor_count').single()
      .then(({ data }) => { if (data) setUserCount(data.value); });
  }, []);

  const loginGitHub = async () => {
    setLoading(true); setError('');
    await sb.auth.signInWithOAuth({ provider:'github', options:{ redirectTo: window.location.href } });
  };

  const submitEmail = async (e) => {
    e.preventDefault();
    if (!email || !password) { setError('請填寫 Email 和密碼'); return; }
    if (password.length < 6)  { setError('密碼至少 6 個字元'); return; }
    setLoading(true); setError(''); setDone('');
    if (tab === 'login') {
      const { error: err } = await sb.auth.signInWithPassword({ email, password });
      if (err) { setError(err.message === 'Invalid login credentials' ? 'Email 或密碼錯誤' : err.message); setLoading(false); }
    } else {
      const { error: err } = await sb.auth.signUp({ email, password });
      if (err) { setError(err.message); setLoading(false); }
      else { setDone('註冊成功！正在登入…'); }
    }
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div className="bobble" style={{ marginBottom:10 }}><Pip size={90} pose="wave"/></div>
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <h1 style={{ fontSize:32, fontWeight:800, color:'#F8FAFC', margin:'0 0 8px',
          textShadow:'0 0 20px rgba(239,68,68,0.5), 2px 2px 0 #000' }}>ENGLISH QUEST</h1>
        {userCount !== null && (
          <div style={{ display:'inline-flex', alignItems:'center', gap:6, marginBottom:8,
            background:'#1E293B', border:'2px solid #10B981', borderRadius:8,
            padding:'5px 14px', fontSize:13, fontWeight:600, color:'#10B981',
            boxShadow:'0 0 12px rgba(16,185,129,0.3)' }}>
            👁️ 已有 <b style={{ fontWeight:800 }}>{userCount}</b> 人來訪過
          </div>
        )}
        <div style={{ fontSize:12, color:'#64748B', fontWeight:400, letterSpacing:0.5 }}>登入後可跨裝置同步學習進度</div>
      </div>

      <div className="rb-card" style={{ width:'100%', maxWidth:360, padding:24 }}>
        <div style={{ display:'flex', background:'#0F1A2E', border:'3px solid #334155', borderRadius:10, padding:4, marginBottom:20 }}>
          {[['login','🎮 登入'],['register','✨ 註冊']].map(([t,label]) => (
            <button key={t} onClick={() => { setTab(t); setError(''); setDone(''); }} style={{
              flex:1, padding:'8px 0', borderRadius:8, border:'none', fontSize:14, fontWeight:800,
              background: tab===t ? '#3B82F6' : 'transparent',
              color: tab===t ? '#fff' : '#475569',
              boxShadow: tab===t ? '0 3px 0 #1E3A8A' : 'none',
              cursor:'pointer', transition:'all 0.15s', fontFamily:'Fredoka, sans-serif' }}>{label}</button>
          ))}
        </div>

        <form onSubmit={submitEmail} style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <input type="email" placeholder="📧 Email" value={email} className="rb-input"
            onChange={e => setEmail(e.target.value)} />
          <input type="password" placeholder="🔒 密碼（至少 6 位）" value={password} className="rb-input"
            onChange={e => setPassword(e.target.value)} />
          {error && <div style={{ fontSize:12, color:'#EF4444', fontWeight:800, textAlign:'center',
            background:'rgba(239,68,68,0.1)', border:'2px solid #EF4444', borderRadius:8, padding:'8px' }}>{error}</div>}
          {done  && <div style={{ fontSize:12, color:'#10B981', fontWeight:800, textAlign:'center',
            background:'rgba(16,185,129,0.1)', border:'2px solid #10B981', borderRadius:8, padding:'8px' }}>{done}</div>}
          <button type="submit" disabled={loading} className="btn-press" style={{
            width:'100%', padding:'12px 0', borderRadius:8, fontSize:15, fontWeight:800,
            background: loading ? '#334155' : '#3B82F6', color: loading ? '#64748B' : '#fff',
            border:'3px solid #000', boxShadow: loading ? 'none' : '0 5px 0 #1E3A8A',
            cursor: loading ? 'not-allowed' : 'pointer', fontFamily:'Fredoka, sans-serif' }}>
            {loading ? '請稍候…' : tab === 'login' ? '▶ 開始遊戲' : '✨ 建立帳號'}
          </button>
        </form>

        <div style={{ display:'flex', alignItems:'center', gap:10, margin:'16px 0' }}>
          <div style={{ flex:1, height:2, background:'#334155' }}/>
          <span style={{ fontSize:12, color:'#475569', fontWeight:800 }}>OR</span>
          <div style={{ flex:1, height:2, background:'#334155' }}/>
        </div>

        <button onClick={loginGitHub} disabled={loading} className="btn-press" style={{
          width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:10,
          padding:'12px 0', background:'#24292e', color:'#fff',
          border:'3px solid #000', borderRadius:8, fontSize:14, fontWeight:800,

          <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">

          </svg>

        </button>
      </div>
    </div>
  );

function App() {
  const [screen,            setScreen]            = React.useState('home');
  const [difficulty,        setDifficulty]        = React.useState(null);
  const [questions,         setQuestions]         = React.useState([]);
  const [results,           setResults]           = React.useState([]);
  const [sessionResult,     setSessionResult]     = React.useState(null);
  const [prog,              setProg]              = React.useState(() => ensureCosmetics(ensureDaily(loadProg())));
  const [showTasks,         setShowTasks]         = React.useState(false);
  const [showBadges,        setShowBadges]        = React.useState(false);
  const [showAvatarEditor,  setShowAvatarEditor]  = React.useState(false);
  const [showLeaderboard,   setShowLeaderboard]   = React.useState(false);
  const [showLevelMap,      setShowLevelMap]      = React.useState(false);
  const [user,              setUser]              = React.useState(null);
  const [authLoading,       setAuthLoading]       = React.useState(true);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      const u = session?.user ?? null;
      setUser(u);
      if (u) {
        loadProgFromDB(u.id).then(p => {
          if (p) setProg(ensureCosmetics(ensureDaily(p)));
        });
      }
      setAuthLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      const u = session?.user ?? null;
      setUser(u);
      if (u) {
        loadProgFromDB(u.id).then(p => {
          if (p) setProg(ensureCosmetics(ensureDaily(p)));
        });
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // 每次有人開網頁就+1（不管有沒有登入）
  React.useEffect(() => {
    (async () => { try { await sb.rpc('increment_visitor_count'); } catch(e) {} })();
  }, []);

  const startQuiz = (diff, count) => {
    const bank   = QB[diff].questions;
    const picked = shuffle(bank).slice(0, Math.min(count, bank.length));
    setDifficulty(diff);
    setQuestions(picked);
    setResults([]);
    setSessionResult(null);
    setScreen('quiz');
  };

  const finishQuiz = (res) => {
    const sr = processSession({ prog, results:res, difficulty, questions });
    setProg(sr.p);
    setResults(res);
    setSessionResult(sr);
    setScreen('results');
    if (user) saveProgToDB(user.id, sr.p);
  };

  const retry = () => startQuiz(difficulty, questions.length);

  const updateCosmetics = (cos) => {
    const newProg = { ...prog, cosmetics: cos };
    setProg(newProg);
    saveProg(newProg);
    if (user) saveProgToDB(user.id, newProg);
    setShowAvatarEditor(false);
  };

  if (authLoading) return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'#0F1A2E' }}>
      <div className="bobble"><Pip size={80} pose="idle"/></div>
      <div style={{ marginTop:12, fontSize:14, fontWeight:800, color:'#475569', letterSpacing:1 }}>LOADING...</div>
    </div>
  );

  if (!user) return <LoginScreen />;

  return (
    <div>
      <div style={{ position:'fixed', top:12, right:16, zIndex:500, display:'flex', gap:8 }}>
        {screen === 'home' && (
          <button onClick={() => setShowAvatarEditor(true)} className="btn-press" style={{
            display:'flex', alignItems:'center', gap:5, padding:'6px 10px',
            background:'#1E293B', border:'3px solid #3B82F6', borderRadius:8,
            fontSize:12, fontWeight:800, color:'#93C5FD', cursor:'pointer',
            boxShadow:'0 3px 0 #1E3A8A' }}>🎭 角色</button>
        )}
        <button onClick={() => sb.auth.signOut()} className="btn-press" style={{
          display:'flex', alignItems:'center', gap:6, padding:'6px 12px',
          background:'#1E293B', border:'3px solid #334155', borderRadius:8,
          fontSize:12, fontWeight:800, color:'#94A3B8', cursor:'pointer',
          boxShadow:'0 3px 0 #000' }}>
          {user.user_metadata?.avatar_url && (
            <img src={user.user_metadata.avatar_url} style={{ width:20, height:20, borderRadius:'50%', border:'2px solid #334155' }} />
          )}
          登出
        </button>
      </div>

      {screen === 'home' && (
        <HomeScreen prog={prog} onStart={startQuiz}
          onShowTasks={() => setShowTasks(true)}
          onShowBadges={() => setShowBadges(true)}
          onAvatarEdit={() => setShowAvatarEditor(true)}
          onShowLeaderboard={() => setShowLeaderboard(true)}
          onShowLevelMap={() => setShowLevelMap(true)}/>
      )}
      {screen === 'quiz' && (
        <QuizScreen
          key={questions.map(q=>q.text||q.word||q.sentence||'').join()}
          questions={questions} difficulty={difficulty} onFinish={finishQuiz}
          onQuit={() => setScreen('home')} cosmetics={prog.cosmetics}
          playerLevel={getLevel(prog.xp)}/>
      )}
      {screen === 'results' && sessionResult && (
        <ResultsScreen results={results} difficulty={difficulty} questions={questions}
          sessionResult={sessionResult} onHome={() => setScreen('home')} onRetry={retry}/>
      )}

      {showTasks        && <TasksModal       prog={prog} onClose={() => setShowTasks(false)}/>}
      {showBadges       && <BadgesModal      prog={prog} onClose={() => setShowBadges(false)}/>}
      {showAvatarEditor && <AvatarEditor     prog={prog} onSave={updateCosmetics} onClose={() => setShowAvatarEditor(false)}/>}
      {showLeaderboard  && <LeaderboardModal prog={prog} user={user} onClose={() => setShowLeaderboard(false)}/>}
      {showLevelMap     && <LevelMapModal    prog={prog} onClose={() => setShowLevelMap(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
