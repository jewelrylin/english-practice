function shade(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const clamp = v => Math.max(0, Math.min(255, v));
  const d = Math.round(255 * pct / 100);
  return '#' + [n>>16, (n>>8)&0xff, n&0xff].map(c => clamp(c+d).toString(16).padStart(2,'0')).join('');
}
function speakEn(text, rate=0.85) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);

}

const LEVELS = [0, 80, 200, 400, 700, 1100, 1700, 2500, 3600, 5000];
const LEVEL_TITLES = ['初學者','入門者','學習者','中級生','進階者','熟練者','高手','達人','專家','大師'];
const DIFF_XP = { easy:5, medium:10, hard:15, expert:25 };

function getLevel(xp) {
  let lv = 1;
  for (let i = 1; i < LEVELS.length; i++) { if (xp >= LEVELS[i]) lv = i+1; else break; }
  return Math.min(lv, 10);
}
function nextLevelXP(xp) {
  const lv = getLevel(xp);
  return lv >= 10 ? null : LEVELS[lv];
}

function loadProg() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    const base = { xp:0, totalCorrect:0, totalSessions:0, perfectSessions:0,
      maxStreak:0, diffStats:{easy:0,medium:0,hard:0,expert:0},
      typeCorrect:{listen:0,phonics:0,fill:0,order:0},
      badges:[], allDailyDone:0, daily:null };
    return raw ? { ...base, ...JSON.parse(raw) } : base;
  } catch { return { xp:0, totalCorrect:0, totalSessions:0, perfectSessions:0,
    maxStreak:0, diffStats:{easy:0,medium:0,hard:0,expert:0},
    typeCorrect:{listen:0,phonics:0,fill:0,order:0}, badges:[], allDailyDone:0, daily:null }; }
}
function saveProg(p) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch {}
}
function ensureDaily(p) {
  const today = todayStr();
  if (p.daily?.date === today) return p;
  const ids = shuffle(TASK_POOL).slice(0,3).map(t=>t.id);
  return { ...p, daily:{ date:today, taskIds:ids, done:[],
    answered:0, correct:0, sessions:0, hardSess:0, perfect:0, streak:0, listenOk:0 } };
}

function calcMaxStreak(results) {
  let max=0, cur=0;
  for (const r of results) { if (r) { cur++; max=Math.max(max,cur); } else cur=0; }
  return max;
}

// After a session: compute gains, update progress, return what changed
function processSession({ prog, results, difficulty, questions }) {
  let p = ensureDaily({ ...prog,
    diffStats: { ...prog.diffStats },
    typeCorrect: { ...prog.typeCorrect },
    daily: prog.daily ? { ...prog.daily } : null });

  const correct = results.filter(Boolean).length;
  const total   = results.length;
  const pct     = Math.round((correct/total)*100);
  const streak  = calcMaxStreak(results);
  const perfect = pct === 100;

  // Per-question XP
  const baseXP = correct * DIFF_XP[difficulty];
  // Session bonus
  const bonusXP = perfect ? 50 : pct >= 90 ? 30 : pct >= 70 ? 15 : 0;
  // Streak bonus
  const streakBonus = Math.floor(streak / 3) * 5;
  let xpGained = baseXP + bonusXP + streakBonus;

  // Type stats
  questions.forEach((q, i) => {
    if (results[i]) p.typeCorrect[q.type] = (p.typeCorrect[q.type]||0) + 1;
  });

  const listenCorrectThisSession = questions.filter((q,i) => q.type==='listen' && results[i]).length;

  // Update core stats
  p.xp                += xpGained;
  p.totalCorrect      += correct;
  p.totalSessions     += 1;
  if (perfect) p.perfectSessions += 1;
  p.maxStreak          = Math.max(p.maxStreak, streak);
  p.diffStats[difficulty] = (p.diffStats[difficulty]||0) + 1;

  // Daily tracking
  p.daily.answered += total;
  p.daily.correct  += correct;
  p.daily.sessions += 1;
  if (difficulty === 'hard' || difficulty === 'expert') p.daily.hardSess += 1;
  if (perfect) p.daily.perfect += 1;
  p.daily.streak   = Math.max(p.daily.streak, streak);
  p.daily.listenOk += listenCorrectThisSession;

  // Check daily tasks completion & award XP
  const newlyCompletedTasks = [];
  const taskDefs = TASK_POOL.filter(t => p.daily.taskIds.includes(t.id));
  taskDefs.forEach(t => {
    if (p.daily.done.includes(t.id)) return;
    const val = p.daily[t.key] || 0;
    if (val >= t.target) {
      p.daily.done.push(t.id);
      p.xp += t.reward;
      xpGained += t.reward;
      newlyCompletedTasks.push(t);
    }
  });
  const allDailyNowDone = taskDefs.length > 0 && taskDefs.every(t => p.daily.done.includes(t.id));
  if (allDailyNowDone && !prog.daily?.done?.length === 0) p.allDailyDone += 1;

  // Check badge unlocks
  const prevBadges = new Set(prog.badges || []);
  const newBadges  = [];
  BADGE_DEFS.forEach(b => {
    if (!prevBadges.has(b.id) && b.check(p)) {
      p.badges = [...(p.badges||[]), b.id];
      newBadges.push(b);
    }
  });

  // Level up?
  const prevLv = getLevel(prog.xp);
  const newLv  = getLevel(p.xp);
  const leveledUp = newLv > prevLv;

  saveProg(p);
  return { p, xpGained, bonusXP, streakBonus, streak, newBadges, leveledUp, newLv,
           newlyCompletedTasks, allDailyDone: allDailyNowDone };
}

const VOWEL_IPA = { a:'/æ/', e:'/ɛ/', i:'/ɪ/', o:'/ɒ/', u:'/ʌ/', sh:'/ʃ/', th:'/θ/', ch:'/tʃ/', wh:'/w/' };
function slotIPA(s, picked) {
  if (s !== '_') return s==='c' ? '/k/' : s==='t' ? '/t/' : `/${s}/`;
  if (!picked) return '/  /';
  return VOWEL_IPA[picked] || `/${picked}/`;
}

function ListenQuestion({ q, onAnswer }) {
  const [choices] = React.useState(() => shuffle(q.choices.map((c,i) => ({ label:c, origIdx:i }))));
  const [picked, setPicked] = React.useState(null);
  const [playing, setPlaying] = React.useState(false);

  const play = () => {
    setPlaying(true);
    speakEn(q.text, 0.82);
    setTimeout(() => setPlaying(false), Math.max(1400, q.text.length * 60));
  };
  React.useEffect(() => { setTimeout(play, 400); }, []);

  const submit = (idx) => {
    if (picked !== null) return;
    const isCorrect = choices[idx].origIdx === q.correct;
    setPicked(idx); onAnswer(isCorrect, choices[idx].label, q.choices[q.correct]);
  };

  return (
    <div className="slide-up">
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:800, color:'#888', letterSpacing:1, marginBottom:8 }}>聆聽並選出你聽到的句子</div>
        <div style={{ fontSize:50, marginBottom:12 }}>{q.emoji}</div>
        <div style={{ display:'inline-flex', alignItems:'center', gap:14, background:'#fff', borderRadius:999,
          padding:'10px 20px', boxShadow:'0 3px 12px rgba(0,0,0,0.08)', cursor:'pointer' }} onClick={play}>
          <div style={{ width:44, height:44, borderRadius:'50%', background:playing?'#ef8eb5':'#5b8def',
            display:'flex', alignItems:'center', justifyContent:'center', transition:'background .2s',
            boxShadow:`inset 0 -3px 0 ${shade(playing?'#ef8eb5':'#5b8def',-22)}` }}>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              {playing && <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.06c1.48-.73 2.5-2.25 2.5-4.03zm2.5 0c0 2.89-1.57 5.43-4 6.83v-2.19c1.29-1.14 2-2.82 2-4.64s-.71-3.5-2-4.64V5.17c2.43 1.4 4 3.94 4 6.83z"/>}
            </svg>
          </div>
          <SoundWave active={playing} color="#5b8def" bars={14}/>
        </div>
        <div style={{ fontSize:12, color:'#aaa', marginTop:8 }}>點擊播放音訊 · 可重複播放</div>
      </div>
      <div style={{ display:'grid', gap:10 }}>
        {choices.map((c, i) => {
          const isCorrect = c.origIdx === q.correct;
          const isPicked  = picked === i;
          let bg='#fff', border='2px solid #e0e0e0', clr='#2d3a2e';
          if (picked !== null) {
            if (isCorrect) { bg='#e8f8ef'; border='2px solid #3aa56b'; clr='#1a6b40'; }
            else if (isPicked) { bg='#ffeaea'; border='2px solid #d65a5a'; clr='#a83a3a'; }
          }
          return (
            <button key={i} onClick={() => submit(i)} disabled={picked!==null} style={{
              background:bg, border, color:clr, borderRadius:16, padding:'14px 18px',
              fontSize:14, fontWeight:700, textAlign:'left', cursor:picked!==null?'default':'pointer',
              boxShadow:'0 2px 0 rgba(0,0,0,0.04)', transition:'all .2s',
              display:'flex', alignItems:'center', gap:10,
            }}>
              <span style={{ fontSize:16, fontWeight:800, color:'#ccc', minWidth:20 }}>{String.fromCharCode(65+i)}</span>
              <span>{c.label}</span>
              {picked!==null && isCorrect && <span style={{ marginLeft:'auto', color:'#3aa56b', fontSize:18 }}>✓</span>}
              {picked!==null && isPicked && !isCorrect && <span style={{ marginLeft:'auto', color:'#d65a5a', fontSize:18 }}>✕</span>}
            </button>
          );
        })}
      </div>
      {picked !== null && (
        <div style={{ marginTop:12, padding:'10px 14px', borderRadius:14,
          background:choices[picked].origIdx===q.correct ? '#e8f8ef' : '#fff3c2',
          fontSize:13, color:'#555', fontWeight:600 }}>
          💡 <b style={{color:'#3a2a1a'}}>{q.text}</b> · {q.cn}
        </div>
      )}
    </div>
  );
}

function PhonicsQuestion({ q, onAnswer }) {
  const [picked, setPicked]   = React.useState(null);
  const [answered, setAnswered] = React.useState(false);
  const [choices] = React.useState(() => shuffle(q.choices));

  const submit = (letter) => {
    if (answered) return;
    setPicked(letter); setAnswered(true);
    onAnswer(letter===q.answer, letter, q.answer);
  };

  return (
    <div className="slide-up">
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:800, color:'#888', letterSpacing:1, marginBottom:8 }}>填入缺少的字母，拼出這個單字</div>
        <div style={{ fontSize:64, marginBottom:10 }}>{q.emoji}</div>
        <button onClick={() => speakEn(q.word, 0.7)} style={{ background:'#5b8def', border:'none',
          borderRadius:999, padding:'8px 18px', color:'#fff', fontSize:13, fontWeight:700,
          cursor:'pointer', marginBottom:16, boxShadow:`inset 0 -3px 0 ${shade('#5b8def',-22)}` }}>
          🔊 聽發音
        </button>
        <div style={{ display:'flex', gap:10, justifyContent:'center', marginBottom:8 }}>
          {q.slots.map((s, i) => {
            const isBlank = s==='_';
            let bg='#fff', bdr='2px solid #e0e0e0';
            if (isBlank && picked) {
              if (answered) { bg=picked===q.answer?'#e8f8ef':'#ffeaea'; bdr=`2px solid ${picked===q.answer?'#3aa56b':'#d65a5a'}`; }
              else { bg='#fff3c2'; bdr='2px solid #b88a1f'; }
            } else if (isBlank) { bg='rgba(200,200,255,0.3)'; bdr='2.5px dashed #9b59b6'; }
            return (
              <div key={i} style={{ width:64, height:80, borderRadius:16, background:bg, border:bdr,

                boxShadow:!isBlank?'0 3px 0 rgba(0,0,0,0.08)':'none', transition:'all .2s' }}>
                {isBlank ? (picked||'') : s}
              </div>
            );
          })}
        </div>
        <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
          {q.slots.map((s, i) => (
            <div key={i} style={{ width:64, textAlign:'center', fontSize:12, color:'#777', fontWeight:700 }}>
              {slotIPA(s, s==='_' ? picked : null)}
            </div>
          ))}
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'center', gap:12, marginTop:16 }}>
        {choices.map(letter => {
          const isCorrect=letter===q.answer, isPicked=letter===picked;
          let bg='#fff', clr='#2d3a2e';
          if (answered) { if (isCorrect){bg='#3aa56b';clr='#fff';} else if(isPicked){bg='#d65a5a';clr='#fff';} else{bg='#f5f5f5';clr='#ccc';} }
          return (
            <button key={letter} onClick={() => submit(letter)} disabled={answered}
              className={!answered?'btn-press':''} style={{
                width:64, height:64, borderRadius:'50%', background:bg, border:'none',
                fontSize:28, fontWeight:800, color:clr, cursor:answered?'default':'pointer',
                boxShadow:'inset 0 -4px 0 rgba(0,0,0,0.1), 0 4px 0 rgba(0,0,0,0.08)',
                fontFamily:'Fredoka, sans-serif',
                opacity:answered&&!isCorrect&&!isPicked?0.4:1,
                transform:isPicked&&answered?'scale(1.1)':'scale(1)', transition:'all .2s',
              }}>{letter}</button>
          );
        })}
      </div>
      {answered && (
        <div style={{ marginTop:16, padding:'10px 14px', borderRadius:14,
          background:picked===q.answer?'#e8f8ef':'#fff3c2', fontSize:13, fontWeight:600, color:'#555' }}>
          {picked===q.answer
            ? `✅ 正確！ "${q.word}" · ${VOWEL_IPA[q.answer]||`/${q.answer}/`}`
            : `💡 正確答案是 "${q.answer}" · 這個字是 "${q.word}"`}
        </div>
      )}
    </div>
  );
}

      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {choices.map((c, i) => {
          const isCorrect=c.label===q.answer, isPicked=picked===i;
          let bg='#fff', border='2px solid #e8e8e8', clr='#2d3a2e';
          if (picked!==null) {
            if (isCorrect){bg='#e8f8ef';border='2px solid #3aa56b';clr='#1a6b40';}
            else if(isPicked){bg='#ffeaea';border='2px solid #d65a5a';clr='#a83a3a';}
            else{bg='#fafafa';clr='#aaa';}
          }
          return (
            <button key={i} onClick={() => submit(i)} disabled={picked!==null}
              className={!picked?'btn-press':''} style={{
                background:bg, border, color:clr, borderRadius:16, padding:'16px 12px',
                fontSize:15, fontWeight:800, cursor:picked!==null?'default':'pointer',
                boxShadow:'0 2px 0 rgba(0,0,0,0.05)', transition:'all .2s',
                fontFamily:'Fredoka, sans-serif',
              }}>
              {c.label}
              {picked!==null && isCorrect && <span style={{marginLeft:6, fontSize:16}}>✓</span>}
              {picked!==null && isPicked && !isCorrect && <span style={{marginLeft:6, fontSize:16}}>✕</span>}
            </button>
          );
        })}
      </div>
      {picked!==null && choices[picked].label!==q.answer && (
        <div style={{ marginTop:12, padding:'10px 14px', borderRadius:14, background:'#fff3c2',
          fontSize:13, fontWeight:700, color:'#5a4a3a' }}>
          💡 正確答案：<b style={{color:'#b88a1f'}}>{q.answer}</b>
        </div>
      )}
    </div>
  );
}

function OrderQuestion({ q, onAnswer }) {
  const [tiles]    = React.useState(() => shuffle(q.words.map((w,i)=>({word:w,id:i}))));
  const [selected, setSelected] = React.useState([]);
  const [answered, setAnswered] = React.useState(false);
  const [correct,  setCorrect]  = React.useState(false);

  const remaining = tiles.filter(t => !selected.includes(t.id));
  const sentence  = selected.map(id => tiles.find(t=>t.id===id).word).join(' ');

  const check = () => {
    const norm = sentence.toLowerCase().replace(/[?!,]/g,'').trim();
    const exp  = q.answer.toLowerCase().replace(/[?!,]/g,'').trim();
    const ok = norm===exp;
    setCorrect(ok); setAnswered(true);
    onAnswer(ok, sentence, q.answer);
  };

  return (
    <div className="slide-up">
      <div style={{ fontSize:13, fontWeight:800, color:'#888', letterSpacing:1, marginBottom:8, textAlign:'center' }}>
        點擊單字，排列成正確的句子 {q.emoji}
      </div>
      <div style={{ minHeight:72, background:'#fff', borderRadius:16, padding:'12px 14px',
        border: answered ? `2px solid ${correct?'#3aa56b':'#d65a5a'}` : '2px dashed #9b59b6',
        boxShadow:'0 2px 8px rgba(0,0,0,0.06)', marginBottom:10,
        display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
        {selected.length===0 && <span style={{color:'#ccc',fontSize:13,fontWeight:600}}>點下方單字開始排列…</span>}
        {selected.map(id => {
          const t = tiles.find(t=>t.id===id);
          return (
            <button key={id} onClick={() => !answered && setSelected(s=>s.filter(x=>x!==id))} disabled={answered}
              style={{ background:'#9b59b6', color:'#fff', border:'none', borderRadius:10, padding:'6px 12px',
                fontSize:15, fontWeight:700, cursor:answered?'default':'pointer',
                boxShadow:`inset 0 -2px 0 ${shade('#9b59b6',-22)}` }}>{t.word}</button>
          );
        })}
      </div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, justifyContent:'center', minHeight:52, marginBottom:12 }}>
        {remaining.map(t => (
          <button key={t.id} onClick={() => !answered && setSelected(s=>[...s,t.id])} disabled={answered}
            className="btn-press" style={{ background:'#f0f4ff', color:'#2d3a2e', border:'2px solid #c8d4f8',
              borderRadius:10, padding:'8px 14px', fontSize:15, fontWeight:700,
              cursor:'pointer', boxShadow:'0 2px 0 rgba(0,0,0,0.06)' }}>{t.word}</button>
        ))}
      </div>
      {!answered && (
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={() => setSelected([])} style={{ flex:1, background:'#f5f5f5', border:'2px solid #e0e0e0',
            borderRadius:14, padding:'12px', fontSize:14, fontWeight:700, cursor:'pointer', color:'#888' }}>↺ 重置</button>
          <BigButton onClick={check} disabled={selected.length<tiles.length} color='#9b59b6' style={{flex:2}}>
            ✓ 確認答案
          </BigButton>
        </div>
      )}
      {answered && (
        <div style={{ padding:'12px 14px', borderRadius:14, marginTop:8,
          background:correct?'#e8f8ef':'#fff3c2', fontSize:13, fontWeight:700, color:'#555' }}>
          {correct ? '✅ 排列正確！'
            : <span>💡 正確句子：<br/><b style={{color:'#b88a1f',fontSize:14}}>{q.answer}</b></span>}
        </div>
      )}
    </div>
  );
}

// ── Quiz screen ───────────────────────────────────────────────────────────────
function QuizScreen({ questions, difficulty, onFinish, onQuit }) {
  const diff = QB[difficulty];
  const [current,    setCurrent]    = React.useState(0);
  const [results,    setResults]    = React.useState([]);
  const [feedback,   setFeedback]   = React.useState(null);
  const [xpFloats,   setXpFloats]   = React.useState([]);
  const [showQuit,   setShowQuit]   = React.useState(false);

  const q       = questions[current];
  const correct = results.filter(Boolean).length;

  const handleAnswer = (isCorrect) => {
    setResults(r => [...r, isCorrect]);
    setFeedback({ isCorrect });
    if (isCorrect) {
      const id = Date.now();
      const xp = DIFF_XP[difficulty];
      setXpFloats(f => [...f, { id, xp }]);
      setTimeout(() => setXpFloats(f => f.filter(x => x.id !== id)), 1200);
    }
  };

  const next = () => {
    setFeedback(null);
    if (current + 1 >= questions.length) onFinish([...results, ...(feedback ? [] : [])]);
    else setCurrent(c => c+1);
  };

  const qLabel = { listen:'👂 聆聽', phonics:'🔤 拼音', fill:'📝 填空', order:'🔀 排句' };

  return (
    <div style={{ maxWidth:600, margin:'0 auto', padding:'20px 16px', position:'relative' }}>
      {/* Floating XP */}
      {xpFloats.map(f => (
        <div key={f.id} className="xp-pop" style={{
          position:'fixed', top:'38%', left:'50%', transform:'translateX(-50%)',
          fontSize:22, fontWeight:800, color:'#3aa56b', fontFamily:'Fredoka, sans-serif',
          pointerEvents:'none', zIndex:100, textShadow:'0 2px 8px rgba(0,0,0,0.15)',
        }}>+{f.xp} XP ⚡</div>
      ))}

      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
        <button onClick={() => setShowQuit(true)} className="btn-press" style={{
          width:34, height:34, borderRadius:10, border:'none', background:'rgba(0,0,0,0.06)',
          fontSize:16, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
          flexShrink:0,
        }}>✕</button>
        <span style={{ fontSize:22 }}>{diff.emoji}</span>
        <span style={{ fontSize:13, fontWeight:800, color:diff.color, letterSpacing:1 }}>
          {diff.label.toUpperCase()}
        </span>
        <div style={{ marginLeft:'auto', fontSize:12, fontWeight:700, color:'#aaa',
          background:'#fff', borderRadius:999, padding:'4px 10px', boxShadow:'0 1px 4px rgba(0,0,0,0.08)' }}>
          {qLabel[q.type]}
        </div>
      </div>

      {/* Quit confirmation */}
      {showQuit && (
        <div className="modal-bg">
          <div style={{ background:'#fff', borderRadius:24, padding:28, maxWidth:320, width:'100%',
            boxShadow:'0 20px 60px rgba(0,0,0,0.25)', textAlign:'center' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>⚠️</div>
            <div style={{ fontSize:18, fontWeight:800, color:'#2d3a2e', fontFamily:'Fredoka', marginBottom:8 }}>
              確定要結束練習？
            </div>
            <div style={{ fontSize:13, color:'#e94f5b', fontWeight:700, marginBottom:20, lineHeight:1.5 }}>
              提前結束將無法累積經驗值
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={() => setShowQuit(false)} className="btn-press" style={{
                flex:1, padding:'12px 0', borderRadius:14, border:'2px solid #e0e0e0',
                background:'#fff', fontSize:14, fontWeight:800, color:'#5a6a5e', cursor:'pointer',
              }}>繼續練習</button>
              <button onClick={onQuit} className="btn-press" style={{
                flex:1, padding:'12px 0', borderRadius:14, border:'none',
                background:'#e94f5b', color:'#fff', fontSize:14, fontWeight:800,
                boxShadow:'0 4px 0 #c03a47', cursor:'pointer',
              }}>結束</button>
            </div>
          </div>
        </div>
      )}

      {/* Progress */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:18 }}>
        <div style={{ flex:1, height:12, borderRadius:999, background:'rgba(0,0,0,0.08)', overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${(current/questions.length)*100}%`,
            background:`linear-gradient(90deg, ${shade(diff.color,10)}, ${diff.color})`,
            borderRadius:999, transition:'width .4s' }}/>
        </div>
        <div style={{ fontSize:13, fontWeight:800, color:'#666', whiteSpace:'nowrap' }}>{current}/{questions.length}</div>
        <div style={{ fontSize:13, fontWeight:800, color:'#3aa56b', whiteSpace:'nowrap' }}>✓ {correct}</div>
      </div>

      <div style={{ background:'#fff', borderRadius:24, padding:'24px 20px', boxShadow:'0 4px 24px rgba(0,0,0,0.07)' }}>
        {q.type==='listen'  && <ListenQuestion  key={current} q={q} onAnswer={handleAnswer}/>}
        {q.type==='phonics' && <PhonicsQuestion key={current} q={q} onAnswer={handleAnswer}/>}
        {q.type==='fill'    && <FillQuestion    key={current} q={q} onAnswer={handleAnswer}/>}
        {q.type==='order'   && <OrderQuestion   key={current} q={q} onAnswer={handleAnswer}/>}

        {feedback && (
          <div className="slide-up" style={{
            marginTop:16, borderRadius:18, padding:'14px 16px',
            background: feedback.isCorrect ? '#3aa56b' : '#d65a5a',
            boxShadow:`inset 0 -5px 0 ${shade(feedback.isCorrect?'#3aa56b':'#d65a5a',-22)}`,
            display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{fontSize:28}}>{feedback.isCorrect ? '🎉' : '🤔'}</span>
              <div>
                <div style={{ color:'#fff', fontWeight:800, fontSize:15, fontFamily:'Fredoka, sans-serif' }}>
                  {feedback.isCorrect ? '答對了！太棒了！' : '答錯了，繼續加油！'}
                </div>
                {feedback.isCorrect && (
                  <div style={{ color:'rgba(255,255,255,0.85)', fontSize:12, fontWeight:600 }}>
                    +{DIFF_XP[difficulty]} XP
                  </div>
                )}
              </div>
            </div>
            <button onClick={next} style={{ background:'rgba(255,255,255,0.25)',
              border:'2px solid rgba(255,255,255,0.4)', color:'#fff', borderRadius:14,
              padding:'8px 16px', fontSize:14, fontWeight:800, cursor:'pointer',
              whiteSpace:'nowrap', fontFamily:'Fredoka, sans-serif' }}>
              {current+1 >= questions.length ? '看結果 →' : '下一題 →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

              background: count===n ? '#5b8def' : '#f0f4ff',
              color: count===n ? '#fff' : '#5b8def',
              fontSize:17, fontWeight:800, cursor:'pointer',
              boxShadow: count===n ? `inset 0 -3px 0 ${shade('#5b8def',-22)}` : 'none',
              fontFamily:'Fredoka, sans-serif', transition:'all .15s',
            }}>{n}</button>
          ))}
        </div>
      </div>

      {/* Difficulty cards */}
      <div style={{ display:'grid', gap:10 }}>
        {Object.entries(QB).map(([key, d]) => {
          const sessions = prog.diffStats?.[key] || 0;
          return (
            <button key={key} onClick={() => onStart(key, count)}
              className="btn-press" style={{
                background:d.bg, border:`2px solid ${shade(d.color,20)}`,
                borderRadius:18, padding:'14px 18px', textAlign:'left', cursor:'pointer',
                boxShadow:`0 4px 0 ${shade(d.color,-10)}`,
                display:'flex', alignItems:'center', gap:14,
              }}>
              <div style={{ fontSize:36 }}>{d.emoji}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:17, fontWeight:800, color:d.color, fontFamily:'Fredoka, sans-serif' }}>{d.label}</div>
                <div style={{ fontSize:11, color:'#777', fontWeight:600, marginTop:1 }}>{d.desc}</div>
                {sessions > 0 && <div style={{ fontSize:10, color:d.color, fontWeight:700, marginTop:3, opacity:0.8 }}>
                  已完成 {sessions} 場
                </div>}
              </div>
              <div style={{ fontSize:16 }}>{'⭐'.repeat(d.stars)}</div>
            </button>
          );
        })}
      </div>

      <div style={{ textAlign:'center', marginTop:18, fontSize:11, color:'#bbb', fontWeight:600 }}>
        👂 聆聽 · 🔤 拼音 · 📝 填空 · 🔀 排句 — 四種題型混合出題
      </div>
    </div>
  );
}

// ── Login screen ─────────────────────────────────────────────────────────────
function LoginScreen() {
  const [tab,      setTab]      = React.useState('login'); // login | register
  const [email,    setEmail]    = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading,  setLoading]  = React.useState(false);
  const [error,    setError]    = React.useState('');
  const [done,     setDone]     = React.useState(''); // success message

  const inputStyle = {
    width:'100%', padding:'12px 14px', borderRadius:12, fontSize:15,
    border:'2px solid #e8eaf0', outline:'none', fontFamily:'Nunito, sans-serif',
    background:'#fafbff', transition:'border-color 0.15s',
  };

  const loginGitHub = async () => {
    setLoading(true); setError('');
    await sb.auth.signInWithOAuth({ provider:'github', options:{ redirectTo: window.location.href } });
  };

  const submitEmail = async (e) => {
    e.preventDefault();
    if (!email || !password) { setError('請填寫 Email 和密碼'); return; }
    if (password.length < 6)  { setError('密碼至少 6 個字元'); return; }
    setLoading(true); setError(''); setDone('');
    if (tab === 'login') {
      const { error: err } = await sb.auth.signInWithPassword({ email, password });
      if (err) { setError(err.message === 'Invalid login credentials' ? 'Email 或密碼錯誤' : err.message); setLoading(false); }
    } else {
      const { error: err } = await sb.auth.signUp({ email, password });
      if (err) { setError(err.message); setLoading(false); }
      else { setDone('註冊成功！正在登入…'); }
    }
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div className="bobble" style={{ marginBottom:16 }}><Pip size={90} pose="wave"/></div>
      <div style={{ textAlign:'center', marginBottom:24 }}>
        <div style={{ fontSize:26, fontWeight:800, fontFamily:'Fredoka', color:'#2d3a2e' }}>Pip's English Practice</div>
        <div style={{ fontSize:13, color:'#5a6a5e', marginTop:4 }}>登入後即可跨裝置同步學習進度</div>
      </div>

      <div style={{ width:'100%', maxWidth:360, background:'#fff', borderRadius:24, padding:24, boxShadow:'0 8px 32px rgba(0,0,0,0.1)' }}>
        {/* Tabs */}
        <div style={{ display:'flex', background:'#f3f4f8', borderRadius:12, padding:4, marginBottom:20 }}>
          {[['login','登入'],['register','註冊']].map(([t,label]) => (
            <button key={t} onClick={() => { setTab(t); setError(''); setDone(''); }} style={{
              flex:1, padding:'8px 0', borderRadius:10, border:'none', fontSize:14, fontWeight:800,
              background: tab === t ? '#fff' : 'transparent',
              color: tab === t ? '#2d3a2e' : '#9aa',
              boxShadow: tab === t ? '0 2px 6px rgba(0,0,0,0.1)' : 'none',
              cursor:'pointer', transition:'all 0.15s',
            }}>{label}</button>
          ))}
        </div>

        {/* Email form */}
        <form onSubmit={submitEmail} style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <input type="email" placeholder="Email" value={email}
            onChange={e => setEmail(e.target.value)} style={inputStyle}
            onFocus={e => e.target.style.borderColor='#5b8def'}
            onBlur={e => e.target.style.borderColor='#e8eaf0'} />
          <input type="password" placeholder="密碼（至少 6 位）" value={password}
            onChange={e => setPassword(e.target.value)} style={inputStyle}
            onFocus={e => e.target.style.borderColor='#5b8def'}
            onBlur={e => e.target.style.borderColor='#e8eaf0'} />

          {error && <div style={{ fontSize:12, color:'#e94f5b', fontWeight:700, textAlign:'center' }}>{error}</div>}
          {done  && <div style={{ fontSize:12, color:'#3aa56b', fontWeight:700, textAlign:'center' }}>{done}</div>}

          <button type="submit" disabled={loading} className="btn-press" style={{
            padding:'12px 0', borderRadius:12, border:'none', fontSize:15, fontWeight:800,
            background: loading ? '#ccc' : '#5b8def', color:'#fff',
            boxShadow: loading ? 'none' : '0 4px 0 #3a6cd4', cursor: loading ? 'default' : 'pointer',
          }}>
            {loading ? '請稍候…' : tab === 'login' ? '登入' : '建立帳號'}
          </button>
        </form>

        {/* Divider */}
        <div style={{ display:'flex', alignItems:'center', gap:10, margin:'16px 0' }}>
          <div style={{ flex:1, height:1, background:'#e8eaf0' }}/>
          <span style={{ fontSize:12, color:'#aaa', fontWeight:700 }}>或</span>
          <div style={{ flex:1, height:1, background:'#e8eaf0' }}/>
        </div>

        {/* GitHub */}
        <button onClick={loginGitHub} disabled={loading} className="btn-press" style={{
          width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:10,
          padding:'12px 0', background:'#24292e', color:'#fff',
          border:'none', borderRadius:12, fontSize:14, fontWeight:700,
          boxShadow:'0 4px 0 #000', cursor: loading ? 'default' : 'pointer',
        }}>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          用 GitHub 帳號登入
        </button>
      </div>
    </div>
  );
}

// ── App root ──────────────────────────────────────────────────────────────────
function App() {
  const [screen,       setScreen]       = React.useState('home');
  const [difficulty,   setDifficulty]   = React.useState(null);
  const [questions,    setQuestions]    = React.useState([]);
  const [results,      setResults]      = React.useState([]);
  const [sessionResult,setSessionResult]= React.useState(null);
  const [prog,         setProg]         = React.useState(() => ensureDaily(loadProg()));
  const [showTasks,    setShowTasks]    = React.useState(false);
  const [showBadges,   setShowBadges]   = React.useState(false);
  const [user,         setUser]         = React.useState(null);
  const [authLoading,  setAuthLoading]  = React.useState(true);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      const u = session?.user ?? null;
      setUser(u);
      if (u) {
        loadProgFromDB(u.id).then(p => {
          if (p) setProg(ensureDaily(p));
        });
      }
      setAuthLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      const u = session?.user ?? null;
      setUser(u);
      if (u) {
        loadProgFromDB(u.id).then(p => {
          if (p) setProg(ensureDaily(p));
        });
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  const startQuiz = (diff, count) => {
    const bank   = QB[diff].questions;
    const picked = shuffle(bank).slice(0, Math.min(count, bank.length));
    setDifficulty(diff);
    setQuestions(picked);
    setResults([]);
    setSessionResult(null);
    setScreen('quiz');
  };

  const finishQuiz = (res) => {
    const sr = processSession({ prog, results:res, difficulty, questions });
    setProg(sr.p);
    setResults(res);
    setSessionResult(sr);
    setScreen('results');
    if (user) saveProgToDB(user.id, sr.p);
  };

  const retry = () => startQuiz(difficulty, questions.length);

  if (authLoading) return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div className="bobble"><Pip size={80} pose="idle"/></div>
    </div>
  );

  if (!user) return <LoginScreen />;

  return (
    <div>
      {/* 登出按鈕 */}
      <div style={{ position:'fixed', top:12, right:16, zIndex:500 }}>
        <button onClick={() => { setScreen('home'); sb.auth.signOut(); }} className="btn-press" style={{
          display:'flex', alignItems:'center', gap:6, padding:'6px 12px',
          background:'rgba(255,255,255,0.85)', backdropFilter:'blur(8px)',
          border:'1.5px solid #e0e0e0', borderRadius:10,
          fontSize:12, fontWeight:700, color:'#5a6a5e', cursor:'pointer',
        }}>
          {user.user_metadata?.avatar_url && (
            <img src={user.user_metadata.avatar_url} style={{ width:20, height:20, borderRadius:'50%' }} />
          )}
          登出
        </button>
      </div>
      {screen === 'home' && (
        <HomeScreen prog={prog} onStart={startQuiz}
          onShowTasks={() => setShowTasks(true)}
          onShowBadges={() => setShowBadges(true)}/>
      )}
      {screen === 'quiz' && (
        <QuizScreen
          key={questions.map(q=>q.text||q.word||q.sentence||'').join()}
          questions={questions} difficulty={difficulty} onFinish={finishQuiz}
          onQuit={() => setScreen('home')}/>
      )}
      {screen === 'results' && sessionResult && (
        <ResultsScreen results={results} difficulty={difficulty} questions={questions}
          sessionResult={sessionResult}
          onHome={() => setScreen('home')} onRetry={retry}/>
      )}
      {showTasks  && <TasksModal  prog={prog} onClose={() => setShowTasks(false)}/>}
      {showBadges && <BadgesModal prog={prog} onClose={() => setShowBadges(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
